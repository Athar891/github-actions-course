name: 'github actions'

on: push

jobs:
  say-hello:
    runs-on: ubuntu-latest
    steps:
      - name: Greeting-Message
        run: echo "Hello, Github!"
  farewell:
    runs-on: ubuntu-latest
    needs: [say-hello]
    steps:
      - name: Farewell-Message
        run: echo "Goodbye from job2!"
